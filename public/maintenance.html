<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FAF6EF" />
  <title>Обновляем портал — Supply Portal</title>
  <!-- Favicon встраиваем как data: URL, чтобы он работал даже в момент,
       когда dist/ ещё пуст и /favicon.svg отдаёт 503 → maintenance.html. -->
  <link rel="icon" type="image/svg+xml" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="5 5 38 38" fill="none"><circle cx="16" cy="16" r="10" fill="%23D62300"/><circle cx="32" cy="16" r="10" fill="%23F5A623"/><circle cx="16" cy="32" r="10" fill="%23FF8733"/><circle cx="32" cy="32" r="10" fill="%23FFD54F"/><circle cx="24" cy="24" r="8.5" fill="%23502314"/><text x="24" y="29" text-anchor="middle" fill="white" font-size="14" font-weight="900" font-family="Arial, sans-serif">S</text></svg>' />
  <style>
    @font-face {
      font-family: 'Flame';
      src: url('/Flame-Bold.otf') format('opentype');
      font-weight: 700;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Flame';
      src: url('/Flame-Regular.otf') format('opentype');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }

    body {
      font-family: 'Flame', -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      color: #2C1A12;
      background: #FAF6EF;
      min-height: 100vh;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 32px 20px max(20px, env(safe-area-inset-bottom));
      position: relative;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    .stage {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
    }

    /* Плавающие пятна на фоне */
    .blob {
      position: fixed;
      width: 65vmax; height: 65vmax;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.55;
      pointer-events: none;
      z-index: 0;
      will-change: transform;
    }
    .blob--orange {
      top: -25vmax; left: -25vmax;
      background: radial-gradient(circle, #F4A261 0%, transparent 70%);
      animation: float1 20s ease-in-out infinite alternate;
    }
    .blob--coral {
      bottom: -28vmax; right: -22vmax;
      background: radial-gradient(circle, #E76F51 0%, transparent 70%);
      animation: float2 24s ease-in-out infinite alternate;
    }
    .blob--coffee {
      top: 35%; left: -10vmax;
      width: 40vmax; height: 40vmax;
      opacity: 0.32;
      background: radial-gradient(circle, #6B321F 0%, transparent 70%);
      animation: float3 28s ease-in-out infinite alternate;
    }
    @keyframes float1 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(18vmax, 12vmax) scale(1.15); }
    }
    @keyframes float2 {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(-14vmax, -12vmax) scale(1.1); }
    }
    @keyframes float3 {
      0%   { transform: translate(0, 0) rotate(0); }
      100% { transform: translate(8vmax, -6vmax) rotate(20deg); }
    }

    /* Стеклянная карточка */
    .card {
      position: relative;
      z-index: 1;
      max-width: 480px;
      width: 100%;
      background: rgba(255, 255, 255, 0.78);
      backdrop-filter: blur(20px) saturate(140%);
      -webkit-backdrop-filter: blur(20px) saturate(140%);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: 26px;
      padding: 44px 34px 32px;
      text-align: center;
      box-shadow:
        0 22px 60px rgba(80, 35, 20, 0.14),
        0 4px 12px rgba(80, 35, 20, 0.06),
        inset 0 1px 1px rgba(255, 255, 255, 0.6);
    }

    /* Логотип портала */
    .logo {
      position: relative;
      width: 96px; height: 96px; margin: 0 auto 22px;
      animation: bob 3.5s ease-in-out infinite;
      filter: drop-shadow(0 14px 30px rgba(231, 111, 81, 0.32));
    }
    .logo svg { width: 100%; height: 100%; display: block; }
    .logo::before {
      content: '';
      position: absolute; inset: -10px;
      border-radius: 50%;
      border: 2px solid rgba(231, 111, 81, 0.25);
      animation: ringPulse 3.5s ease-in-out infinite;
    }
    @keyframes bob {
      0%, 100% { transform: translateY(0) rotate(-2deg); }
      50%      { transform: translateY(-8px) rotate(2deg); }
    }
    @keyframes ringPulse {
      0%, 100% { transform: scale(1);    opacity: 0.6; }
      50%      { transform: scale(1.18); opacity: 0;   }
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: #2C1A12;
      line-height: 1.15;
    }

    .lead {
      margin: 0 0 26px;
      color: #6B5344;
      font-size: 15.5px;
      line-height: 1.55;
    }

    /* Сменяющиеся подсказки */
    .tip {
      min-height: 1.4em;
      font-size: 13px;
      color: #8B5E3C;
      font-weight: 600;
      margin: 0 0 18px;
      transition: opacity .35s;
    }

    /* Точки-индикатор загрузки */
    .dots {
      display: inline-flex; gap: 9px;
      padding: 12px 18px;
      border-radius: 999px;
      background: rgba(231, 111, 81, 0.08);
      border: 1px solid rgba(231, 111, 81, 0.18);
    }
    .dots span {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #E76F51;
      animation: dot 1.3s ease-in-out infinite;
    }
    .dots span:nth-child(1) { animation-delay: 0s;    }
    .dots span:nth-child(2) { animation-delay: 0.18s; }
    .dots span:nth-child(3) { animation-delay: 0.36s; }
    @keyframes dot {
      0%, 80%, 100% { transform: scale(0.65); opacity: 0.4; }
      40%           { transform: scale(1);    opacity: 1;   }
    }

    .status {
      margin-top: 14px;
      font-size: 11.5px;
      font-weight: 800;
      color: #C16B4D;
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    footer {
      position: relative;
      z-index: 1;
      padding-top: 16px;
      font-size: 12.5px;
      color: #8B7355;
      text-align: center;
    }

    @media (max-width: 480px) {
      .card { padding: 34px 22px 28px; border-radius: 22px; }
      .logo { width: 80px; height: 80px; margin-bottom: 18px; }
      h1 { font-size: 23px; }
      .lead { font-size: 14.5px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <div class="blob blob--orange" aria-hidden="true"></div>
  <div class="blob blob--coral" aria-hidden="true"></div>
  <div class="blob blob--coffee" aria-hidden="true"></div>

  <div class="stage">
    <main class="card" role="status" aria-live="polite">
      <div class="logo" aria-hidden="true">
        <svg viewBox="5 5 38 38" xmlns="http://www.w3.org/2000/svg">
          <circle cx="16" cy="16" r="10" fill="#D62300"/>
          <circle cx="32" cy="16" r="10" fill="#F5A623"/>
          <circle cx="16" cy="32" r="10" fill="#FF8733"/>
          <circle cx="32" cy="32" r="10" fill="#FFD54F"/>
          <circle cx="24" cy="24" r="8.5" fill="#502314"/>
          <text x="24" y="29" text-anchor="middle" fill="white" font-size="14" font-weight="900" font-family="Arial, sans-serif">S</text>
        </svg>
      </div>
      <h1>Обновляем портал</h1>
      <p class="lead">Накатываем свежую версию портала. Обычно это занимает не больше пары минут — страница обновится сама.</p>
      <p class="tip" id="tip">Подготавливаем сборку…</p>
      <div class="dots" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <div class="status">В процессе развёртывания</div>
    </main>
  </div>

  <footer>Supply Portal · Отдел закупок</footer>

  <script>
    // Сменяющиеся подсказки — оживляют ожидание.
    (function () {
      var tips = [
        'Подготавливаем сборку…',
        'Полируем интерфейс…',
        'Кэшируем картинки…',
        'Доставляем чанки…',
        'Запускаем сервис-воркер…',
        'Сейчас вернёмся…',
      ];
      var el = document.getElementById('tip');
      if (!el) return;
      var i = 0;
      setInterval(function () {
        el.style.opacity = '0';
        setTimeout(function () {
          i = (i + 1) % tips.length;
          el.textContent = tips[i];
          el.style.opacity = '1';
        }, 350);
      }, 3200);
    })();

    // Авто-проверка готовности портала. Когда сервер начнёт отдавать
    // настоящий index.html (не нашу maintenance-страницу) — автоматически
    // возвращаемся ИМЕННО на ту страницу, на которой был пользователь, а не
    // на главную. Это безопасно: на этой странице ввода нет.
    (function () {
      var checking = false;
      // Запоминаем исходный путь пользователя — он сохранится в адресной
      // строке, потому что nginx error_page подменяет тело, не меняя URL.
      var restoreTarget = window.location.pathname + window.location.search + window.location.hash;
      if (!restoreTarget || restoreTarget === '/maintenance.html') restoreTarget = '/';
      function check() {
        if (checking) return;
        checking = true;
        fetch('/?_=' + Date.now(), { cache: 'no-store', credentials: 'same-origin' })
          .then(function (r) { return r.ok ? r.text() : ''; })
          .then(function (html) {
            checking = false;
            if (!html) return;
            // Пока сервер всё ещё отдаёт нашу maintenance — продолжаем ждать.
            if (html.indexOf('Обновляем портал') !== -1 ||
                html.indexOf('Технические работы') !== -1) return;
            // Иначе — портал готов, возвращаемся на исходный путь.
            window.location.replace(restoreTarget);
          })
          .catch(function () { checking = false; });
      }
      setInterval(check, 7000);
    })();
  </script>
</body>
</html>
