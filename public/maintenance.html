<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Технические работы</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #FAF6EF;
      color: #502314;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }
    .box {
      max-width: 520px;
      background: #fff;
      border: 1px solid #EDE8E3;
      border-radius: 18px;
      padding: 28px 24px;
      box-shadow: 0 10px 30px rgba(80, 35, 20, 0.08);
    }
    h1 { margin: 0 0 12px; font-size: 24px; }
    p { margin: 0; line-height: 1.5; color: #7a5a4a; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Технические работы</h1>
    <p>Сервис временно обновляется. Попробуйте открыть страницу чуть позже.</p>
  </div>
</body>
</html>
