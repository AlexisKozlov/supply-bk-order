<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta http-equiv="refresh" content="10">
<title>Технические работы</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    background: linear-gradient(135deg, #fff5e6 0%, #ffe9cc 100%);
    color: #2b2b2b;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
  }
  .card {
    max-width: 420px;
    background: #fff;
    border-radius: 16px;
    padding: 32px 28px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.08);
  }
  .icon {
    width: 72px;
    height: 72px;
    margin: 0 auto 18px;
    border-radius: 50%;
    background: #F4A261;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: pulse 1.6s ease-in-out infinite;
  }
  .icon svg { width: 38px; height: 38px; color: #fff; }
  @keyframes pulse {
    0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244,162,97,0.5); }
    50% { transform: scale(1.05); box-shadow: 0 0 0 14px rgba(244,162,97,0); }
  }
  h1 { font-size: 22px; margin: 0 0 10px; color: #1a1a1a; }
  p { font-size: 15px; line-height: 1.5; margin: 0 0 18px; color: #555; }
  .hint { font-size: 13px; color: #888; }
  .dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
  }
  @keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
  }
</style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>
      </svg>
    </div>
    <h1>Идут технические работы</h1>
    <p>Обновляем сервер. Вернёмся через минуту.</p>
    <p class="hint dots">Страница обновится автоматически</p>
  </div>
</body>
</html>
